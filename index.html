<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>의대 합격 매니저 (Pro)</title>
    <link rel="manifest" href="./manifest.json">
    <meta name="theme-color" content="#ffffff">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="default">
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <script src="https://cdn.jsdelivr.net/npm/tesseract.js@5/dist/tesseract.min.js"></script>
    <link rel="stylesheet" href="./css/style.css">
</head>
<body class="min-h-screen pb-24">

    <div id="authOverlay" class="fixed inset-0 bg-white z-[100] flex flex-col items-center justify-center gap-4 text-center">
        <div class="w-12 h-12 border-4 border-slate-100 border-t-indigo-500 rounded-full animate-spin"></div>
        <p id="loadingText" class="text-indigo-600 font-black animate-pulse">Syncing Data...</p>
        <button id="loginBtn" onclick="app.login()" class="hidden mt-4 bg-slate-900 text-white px-8 py-4 rounded-2xl font-black text-sm shadow-xl flex items-center gap-2">구글 계정으로 시작하기</button>
    </div>

    <nav class="fixed top-0 w-full bg-white/90 backdrop-blur-md border-b border-slate-100 z-40 px-6 py-4 flex justify-between items-center">
        <div class="flex items-center gap-3">
            <div class="w-2 h-2 bg-indigo-500 rounded-full animate-pulse"></div>
            <span id="syncStatus" class="text-[10px] font-black text-slate-400 tracking-widest uppercase">Connected</span>
        </div>
        <div id="medicationAlert" class="hidden text-[10px] font-black bg-indigo-600 text-white px-4 py-1.5 rounded-full animate-bounce shadow-lg shadow-indigo-100">
            💊 MEDICINE PEAK TIME
        </div>
        <div class="flex items-center gap-4">
            <button onclick="app.scrollToInventory()" class="p-2 text-slate-400 hover:text-amber-500 transition-colors"><i data-lucide="backpack" class="w-5 h-5"></i></button>
            <button onclick="app.openSettings()" class="p-2 text-slate-400 hover:bg-slate-50 rounded-full transition-colors"><i data-lucide="settings" class="w-5 h-5"></i></button>
        </div>
    </nav>

    <main class="max-w-5xl mx-auto pt-24 px-6">
        <header class="mb-12 glass-card p-8 flex flex-col md:flex-row items-center gap-10">
            <div class="relative inline-flex items-center justify-center">
                <svg class="w-32 h-32">
                    <circle class="text-slate-100" stroke-width="8" stroke="currentColor" fill="transparent" r="58" cx="64" cy="64"/>
                    <circle id="mainProgressCircle" class="text-indigo-500 progress-ring" stroke-width="8" stroke-dasharray="364.4" stroke-dashoffset="364.4" stroke-linecap="round" stroke="currentColor" fill="transparent" r="58" cx="64" cy="64"/>
                </svg>
                <span id="mainPercent" class="absolute text-2xl font-black text-slate-800">0%</span>
            </div>
            <div class="flex-1 w-full">
                <div class="flex justify-between items-end mb-4">
                    <div>
                        <p class="text-[10px] font-black text-indigo-500 mb-1 tracking-widest uppercase">Target Achieved</p>
                        <h2 class="text-2xl font-black text-slate-800">Lv.<span id="userLevel">1</span> <span id="userTitle" class="text-lg font-bold text-slate-400 ml-2">준비생</span></h2>
                    </div>
                    <div class="text-right">
                        <p class="text-[10px] font-black text-slate-400 mb-1 uppercase tracking-widest">Avg Purity</p>
                        <p id="avgPurityText" class="text-xl font-black text-amber-500">0%</p>
                    </div>
                </div>
                <div class="progress-container h-3 mb-2">
                    <div id="expBar" class="bg-indigo-500 h-full transition-all duration-1000" style="width: 0%"></div>
                </div>
                <p class="text-[10px] font-bold text-slate-400 text-right uppercase tracking-widest" id="expText">0 / 100 EXP</p>
            </div>
        </header>

        <div class="grid grid-cols-1 md:grid-cols-2 gap-6 mb-12">
            <div class="glass-card p-6">
                <h3 class="text-[10px] font-black text-slate-400 uppercase tracking-[0.2em] mb-6 flex items-center gap-2"><i data-lucide="calendar" class="w-4 h-4"></i> Month Target</h3>
                <div id="monthlyGoalDisplay" class="space-y-4"></div>
            </div>
            <div class="glass-card p-6">
                <h3 class="text-[10px] font-black text-slate-400 uppercase tracking-[0.2em] mb-6 flex items-center gap-2"><i data-lucide="target" class="w-4 h-4"></i> Week Compass</h3>
                <div id="weeklyGoalDisplay" class="space-y-4"></div>
            </div>
        </div>

        <div class="grid grid-cols-1 lg:grid-cols-12 gap-8">
            <div class="lg:col-span-5">
                <div id="reviewBanner" class="hidden bg-rose-50 border border-rose-100 rounded-[2rem] p-5 mb-8">
                    <div class="flex items-center gap-3 mb-3 text-rose-600">
                        <i data-lucide="bell-ring" class="w-4 h-4 animate-bounce"></i>
                        <h4 class="text-xs font-black">Daily Review Queue</h4>
                    </div>
                    <div id="reviewList" class="space-y-2"></div>
                </div>
                <div class="flex bg-white p-1.5 rounded-2xl border border-slate-100 shadow-sm mb-6">
                    <button onclick="app.setSlot('morning')" id="tab-morning" class="flex-1 slot-tab slot-active">MORNING</button>
                    <button onclick="app.setSlot('afternoon')" id="tab-afternoon" class="flex-1 slot-tab">INPUT</button>
                    <button onclick="app.setSlot('evening')" id="tab-evening" class="flex-1 slot-tab">REVIEW</button>
                </div>
                <div id="slotContent" class="min-h-[400px]"></div>
            </div>
            <div class="lg:col-span-7">
                <div class="flex justify-between items-center mb-6">
                    <h2 class="text-xl font-black text-slate-800">Inventory</h2>
                    <div class="flex gap-2">
                        <label class="bg-slate-100 hover:bg-slate-200 text-slate-500 px-4 py-2 rounded-xl text-[10px] font-bold cursor-pointer transition-colors flex items-center gap-2">
                            <i data-lucide="camera" class="w-3.5 h-3.5"></i> OCR
                            <input type="file" accept="image/*" class="hidden" onchange="app.handleOcr(event)">
                        </label>
                        <button onclick="app.openTextbookModal()" class="px-5 py-2 bg-indigo-600 text-white rounded-xl text-[11px] font-bold shadow-lg shadow-indigo-100">+ Add</button>
                    </div>
                </div>
                <div id="textbookList" class="grid grid-cols-1 gap-6"></div>
            </div>
        </div>

        <section id="inventorySection" class="glass-card mt-20 overflow-hidden">
            <div class="p-8 border-b border-slate-50 flex justify-between items-center bg-slate-50/30">
                <h2 class="text-lg font-black text-slate-800">Learning Data Log</h2>
                <input type="text" id="searchInput" oninput="app.renderInventory()" placeholder="검색..." class="p-3 bg-white border border-slate-100 rounded-xl text-xs font-bold w-full sm:w-64 outline-none focus:ring-2 focus:ring-indigo-500">
            </div>
            <div id="inventoryContainer" class="max-h-[600px] overflow-y-auto custom-scrollbar"></div>
        </section>
    </main>

    <div id="settingsModal" class="fixed inset-0 z-50 flex items-center justify-center p-6 hidden bg-slate-900/20 backdrop-blur-sm">
        <div class="bg-white w-full max-w-sm rounded-[3rem] p-8 shadow-2xl max-h-[90vh] overflow-y-auto custom-scrollbar">
            <h3 class="text-2xl font-black mb-8 text-indigo-600">⚙️ Settings</h3>
            <div class="space-y-6 mb-10">
                <div>
                    <label class="text-[10px] font-black text-slate-400 mb-2 block uppercase tracking-widest">Target Volume</label>
                    <input type="number" id="setTotalGoal" class="w-full bg-slate-50 border border-slate-100 rounded-2xl p-4 text-sm font-bold outline-none focus:ring-2 focus:ring-indigo-500">
                </div>
                <div>
                    <label class="text-[10px] font-black text-slate-400 mb-2 block uppercase tracking-widest">Monthly Map</label>
                    <textarea id="setMonthlyGoal" rows="3" class="w-full bg-slate-50 border border-slate-100 rounded-2xl p-4 text-sm font-bold outline-none focus:ring-2 focus:ring-indigo-500"></textarea>
                </div>
                <div>
                    <label class="text-[10px] font-black text-slate-400 mb-2 block uppercase tracking-widest">Weekly Mission</label>
                    <textarea id="setWeeklyGoal" rows="3" class="w-full bg-slate-50 border border-slate-100 rounded-2xl p-4 text-sm font-bold outline-none focus:ring-2 focus:ring-indigo-500"></textarea>
                </div>
                <div>
                    <label class="text-[10px] font-black text-slate-400 mb-2 block uppercase tracking-widest">Medicine Time</label>
                    <input type="time" id="setMedTime" class="w-full bg-slate-50 border border-slate-100 rounded-2xl p-4 text-sm font-bold outline-none focus:ring-2 focus:ring-indigo-500">
                </div>
            </div>
            <button onclick="app.saveSettings()" class="w-full py-5 bg-indigo-600 rounded-2xl font-black text-white shadow-xl active:scale-95">Save Changes</button>
            <button onclick="app.closeSettings()" class="w-full py-4 mt-2 text-slate-400 font-bold text-sm">Close</button>
        </div>
    </div>

    <div id="scoreModal" class="fixed inset-0 z-[60] flex items-center justify-center p-6 hidden bg-slate-900/30 backdrop-blur-sm">
        <div class="bg-white w-full max-w-sm rounded-[3rem] p-10 shadow-2xl text-center">
            <i data-lucide="gem" class="w-12 h-12 text-amber-400 mx-auto mb-6"></i>
            <h3 class="text-xl font-black mb-1 text-slate-800">순도 측정</h3>
            <p id="scoreTargetName" class="text-[10px] text-slate-400 mb-8 font-bold truncate"></p>
            <input type="number" id="inputScoreValue" placeholder="0 ~ 100" class="w-full bg-slate-50 border-none rounded-3xl p-6 text-4xl font-black text-center text-amber-500 outline-none mb-10 focus:ring-4 focus:ring-amber-500/10">
            <button onclick="app.saveOutputScore()" class="w-full py-5 bg-amber-500 rounded-2xl font-black text-white shadow-xl active:scale-95">Complete</button>
        </div>
    </div>

    <div id="textbookModal" class="fixed inset-0 z-50 flex items-center justify-center p-6 hidden bg-slate-900/20 backdrop-blur-sm">
        <div class="bg-white rounded-[3rem] p-8 max-w-xl w-full shadow-2xl">
            <h2 id="tbModalTitle" class="text-2xl font-black mb-8 text-indigo-600">📖 Textbook</h2>
            <div class="space-y-5 mb-8">
                <input type="text" id="tbTitle" placeholder="교재 제목" class="w-full p-4 bg-slate-50 border border-slate-100 rounded-2xl font-bold outline-none focus:ring-2 focus:ring-indigo-500">
                <select id="tbSubject" class="w-full p-4 bg-slate-50 border border-slate-100 rounded-2xl font-bold text-sm outline-none">
                    <option value="국어">📚 국어</option><option value="수학">📐 수학</option><option value="영어">🔤 영어</option><option value="과탐">🔬 과탐</option><option value="기타">기타</option>
                </select>
                <textarea id="tbItemsText" class="w-full h-48 p-4 bg-slate-50 border border-slate-100 rounded-2xl text-sm leading-relaxed outline-none focus:ring-2 focus:ring-indigo-500" placeholder="단원명을 한 줄에 하나씩 입력하세요."></textarea>
            </div>
            <div class="flex gap-4">
                <button onclick="app.closeTextbookModal()" class="flex-1 py-4 bg-slate-100 rounded-2xl font-black text-sm text-slate-400">Cancel</button>
                <button onclick="app.saveTextbook()" class="flex-1 py-4 bg-indigo-600 text-white rounded-2xl font-black text-sm shadow-lg active:scale-95">Save</button>
            </div>
        </div>
    </div>

    <div id="ocrOverlay" class="fixed inset-0 z-[200] bg-white/90 flex flex-col items-center justify-center p-10 hidden">
        <div class="w-20 h-20 border-4 border-indigo-100 border-t-indigo-500 rounded-full animate-spin mb-8"></div>
        <h3 class="text-2xl font-black text-slate-800 mb-2">Analyzing Image...</h3>
        <p class="text-slate-400 font-bold">잠시만 기다려 주세요.</p>
    </div>

    <script type="module" src="./js/app.js?update=final_ui_v3"></script>

    <script>
        if ('serviceWorker' in navigator) {
            window.addEventListener('load', () => {
                navigator.serviceWorker.getRegistrations().then(function(registrations) {
                    for(let registration of registrations) {
                        registration.unregister(); 
                    }
                });
            });
        }
    </script>
</body>
</html>
